kind = "web"
previewPath = "/"
title = "Rakshak AI — Crime Intelligence Platform"
version = "1.0.0"
id = "artifacts/rakshak-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25516

[services.development]
run = "pnpm --filter @workspace/rakshak-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rakshak-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/rakshak-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25516"
BASE_PATH = "/"
